<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Учёт семейного бюджета: доходы, расходы, диаграмма и история." />
  <meta name="theme-color" content="#16a34a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <title>Учёт — Семейный бюджет</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="app-nav" aria-label="Навигация по сайту">
    <a href="index.html" class="app-nav-link">← На главную</a>
  </nav>

  <header class="header">
    <div class="sub">Баланс</div>
    <div class="balance" id="balance">0 ₽</div>
    <span class="period-hint" id="periodHint"></span>
  </header>

  <main class="container">
    <section class="card" id="historyCard" aria-label="Фильтр истории">
      <div class="history-toolbar">
        <div class="history-field">
          <label for="historyYear">Год</label>
          <select id="historyYear" aria-label="Год"></select>
        </div>
        <div class="history-field">
          <label for="historyMonth">Месяц</label>
          <select id="historyMonth" aria-label="Месяц" disabled></select>
        </div>
        <div class="history-undo-row">
          <button type="button" class="btn-undo" id="undoStepBtn">Шаг назад</button>
          <button type="button" class="btn-undo" id="redoStepBtn">Шаг вперёд</button>
        </div>
        <button type="button" class="btn-clear" id="clearAllBtn">Очистить все операции</button>
      </div>
    </section>

    <section class="card" id="summary" aria-label="Сводка"></section>

    <section class="card" aria-labelledby="chartTitle">
      <h2 id="chartTitle" class="chart-card-title">Расходы по категориям</h2>
      <div class="chart-toolbar" role="group" aria-label="Тип диаграммы">
        <button type="button" class="chart-toggle active" data-chart-mode="expense" aria-pressed="true">Расходы</button>
        <button type="button" class="chart-toggle" data-chart-mode="income" aria-pressed="false">Доходы</button>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </section>

    <section class="card" id="list" aria-label="Список операций"></section>
  </main>

  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему">🌙</button>
  <button class="fab" type="button" onclick="openModal()" aria-label="Добавить операцию">+</button>

  <div class="modal" id="modal" role="dialog" aria-label="Новая операция">
    <input type="date" id="date" />
    <input type="number" id="amount" placeholder="Сумма" min="0" step="0.01" />
    <select id="type">
      <option value="income">Доход</option>
      <option value="expense">Расход</option>
    </select>
    <select id="category"></select>
    <button class="submit" type="button" onclick="addTransaction()">Добавить</button>
  </div>

  <div class="modal-backdrop" id="clearModalBackdrop" aria-hidden="true"></div>
  <div class="modal" id="clearConfirmModal" role="dialog" aria-modal="true" aria-labelledby="clearModalTitle">
    <div class="modal-clear-title" id="clearModalTitle">Удалить все операции?</div>
    <p class="modal-clear-text">Все записи будут удалены из списка. Восстановить их можно кнопкой «Шаг назад» (история шагов хранится только до обновления страницы).</p>
    <div class="modal-actions">
      <button type="button" class="btn-modal-secondary" id="clearModalCancel">Отмена</button>
      <button type="button" class="btn-modal-danger" id="clearModalConfirm">Удалить всё</button>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
